services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: ativa-idoso-api:production
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RACK_ENV: production
      PORT: 3001
      POSTGRES_HOST: db
      RUN_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test:
        - CMD
        - ruby
        - -rnet/http
        - -e
        - >-
          response = Net::HTTP.get_response(URI('http://127.0.0.1:3001/'));
          exit(response.is_a?(Net::HTTPSuccess) ? 0 : 1)
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
