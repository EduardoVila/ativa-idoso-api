# Sample configuration file for Sidekiq.
# Options here can still be overridden by cmd line args.
---
# Global settings
:verbose: false
:concurrency: <%= ENV.fetch('SIDEKIQ_CONCURRENCY', 10) %>
:timeout: 25
:retry: 5 # Default retry count for failed jobs

# Improved logging
:logfile: "./log/sidekiq.log"
:log_level: <%= ENV.fetch('LOG_LEVEL', 'info') %>

# Queue configuration
:queues:
  - [critical, 10]    # Highest priority
  - [default, 5]      # Medium priority
  - [analysis_report, 3]
  - [next_analysis_step, 3]
  - [rerun_clone_analysis_item, 2]
  - [retry_failed_analysis_items, 1]  # Lowest priority

# Custom properties
:redis_url: <%= ENV.fetch('STACKHERO_REDIS_URL_CLEAR', 'redis://localhost:6379/0') %>
:environment: <%= ENV.fetch('RACK_ENV', 'development') %>

# Dead job queue settings
:dead_timeout: 86400  # 24 hours
:dead_max_jobs: 10000 # Max jobs in dead queue

# Environment-specific configurations
production:
  :verbose: false
  :concurrency: <%= ENV.fetch('SIDEKIQ_CONCURRENCY', 15) %>
  :timeout: 30
  :log_level: 'info'
  :retry: 5

  # Production-specific queue weights
  :queues:
    - [critical, 15]
    - [default, 8]
    - [analysis_report, 5]
    - [next_analysis_step, 5]
    - [rerun_clone_analysis_item, 3]
    - [retry_failed_analysis_items, 1]

  # Production Redis with connection pooling
  :redis:
    :url: <%= ENV.fetch('STACKHERO_REDIS_URL_CLEAR', 'redis://localhost:6379/0') %>
    :network_timeout: 5
    :pool_timeout: 5
    :size: <%= ENV.fetch('REDIS_POOL_SIZE', 20) %>

staging:
  :verbose: true
  :concurrency: <%= ENV.fetch('SIDEKIQ_CONCURRENCY', 8) %>
  :timeout: 25
  :log_level: 'info'

development:
  :verbose: true
  :concurrency: <%= ENV.fetch('SIDEKIQ_CONCURRENCY', 3) %>
  :timeout: 15
  :log_level: 'debug'
  :retry: 3

  # Development-friendly settings
  :queues:
    - [critical, 5]
    - [default, 3]
    - [analysis_report, 2]
    - [next_analysis_step, 2]
    - [rerun_clone_analysis_item, 1]
    - [retry_failed_analysis_items, 1]

test:
  :verbose: false
  :concurrency: 1
  :timeout: 1
  :log_level: 'fatal'
  :retry: 0

  # Simple queue setup for testing
  :queues:
    - default
    - analysis_report
    - next_analysis_step
    - rerun_clone_analysis_item
    - retry_failed_analysis_items