default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV['DATABASE_POOL_SIZE'] || 10 %>
  <% if ENV['DATABASE_URL'] %>
  url: <%= ENV['DATABASE_URL'].inspect %>
  <% end %>
  username: <%= ENV['POSTGRES_USER'] || 'postgres' %>
  password: <%= ENV['POSTGRES_PASSWORD'] || 'postgres' %>
  host: <%= ENV['POSTGRES_HOST'] || 'localhost' %>

development:
  <<: *default
  database: ativa_idoso_api_development

test:
  <<: *default
  database: ativa_idoso_api_test

production:
  <<: *default
  database: ativa_idoso_api_production
