services:
  - type: web
    name: ativa-idoso-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.production
    healthCheckPath: /
    envVars:
      - key: RACK_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: RUN_MIGRATIONS
        value: "true"
      - key: RUN_SEEDS
        value: "false"
      - key: DATABASE_POOL_SIZE
        value: "5"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
