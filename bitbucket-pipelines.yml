image: ruby:3.3.5

definitions:
  caches:
    bundler: ./vendor
  services:
    redis:
      image: redis
      memory: 512
    postgres:
      image: postgres
      environment:
        POSTGRES_DB: $DB_TEST
        POSTGRES_USER: $DB_USER
        POSTGRES_PASSWORD: $DB_PASSWORD

  steps:
    - step: &install-dependencies-and-run-tests
        name: Linter and Specs
        caches:
          - bundler
        script:
          - bundle install
          - bundle exec rubocop
          - bundle exec rspec
        services:
          - redis
          - postgres
    - step: &building-artifacts
        name: Building Artifacts
        script:
          - cd ..
          - tar czfv application.tgz build/
          - mv application.tgz build/
          - cd build
        artifacts:
          - application.tgz
    - step: &deploy-to-production
        name: Deploy to Production
        script:
          - pipe: atlassian/heroku-deploy:0.1.1
            variables:
              HEROKU_API_KEY: $HEROKU_API_KEY
              HEROKU_APP_NAME: $HEROKU_APP_NAME
              ZIP_FILE: "application.tgz"
          - curl https://cli-assets.heroku.com/install.sh | bash

pipelines:
  default:
    - step: *install-dependencies-and-run-tests

  branches:
    dev:
      - step: *install-dependencies-and-run-tests

    master:
      - step: *install-dependencies-and-run-tests
      - step: *building-artifacts
      - step: *deploy-to-production
